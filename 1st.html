<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyder-man</title>

    <style>
        body {
            background-image: url("spider-man background.jpg");
            background-size: 100%;
        }

        #d1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #d2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        hr {
            width: 35px;
            border: 1.5px solid black;
            background-color: black;

            transform: rotate(90deg);

            margin-left: -12px;
            margin-right: -12px;
        }

        .mar {
            margin: 30px;
        }

        #d3 {
            display: flex;
            align-items: center;
        }

        p {
            width: 200px;
        }
    </style>
</head>

<body>
    <div id="d1" class="mar">

        <div>
            <img src="marvel.jpg" alt="marvel logo" height="50px" width="150px">
        </div>
        <div id="d2">
            <h3>Peter Parker</h3>
            <hr>
            <h3>Spider-man</h3>
        </div>
    </div>

    <br>
    <div id="d3" class="mar">
        <img src="spider.png" alt="spider face" height="75px" width="65px">
        <h1>Spider-man</h1>
    </div>
    <br>
    <p class="mar">
        <b>Spider-Man is the superhero alter ego of Peter Parker, a brilliant but socially awkward teenager who gains
            superhuman abilities after being bitten by a radioactive spider.</b>
    </p>
</body>

</html>
